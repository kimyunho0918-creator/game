<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학교 건물 강화하기 (Ultimate Dark Edition)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbit&display=swap');
        
        /* 1. 다이나믹 애니메이션 배경 & 폰트 */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        body {
            font-family: 'Orbit', sans-serif;
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(-45deg, #090a0f, #1b2735, #223447, #0d131a);
            background-size: 400% 400%; animation: gradientBG 20s ease infinite;
            color: #ecf0f1; font-weight: 600; overflow: hidden;
        }
        
        /* 2. 레이아웃 최적화 (비율 7:3 조정 및 사이즈 반응형 처리) */
        #app-container { 
            display: flex; gap: 30px; width: 96%; max-width: 1400px; height: 92vh; 
        }
        
        /* 프리미엄 다크 글래스모피즘 공통 */
        .glass-panel {
            background: rgba(20, 25, 30, 0.65);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
            border-right: 1px solid rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(0, 0, 0, 0.4);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7), inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* 메인 게임 컨테이너 (70%) */
        #game-container {
            flex: 1 1 70%; padding: 40px; box-sizing: border-box; position: relative;
            display: flex; flex-direction: column; overflow: hidden;
        }
        
        /* 명예의 전당 컨테이너 (30%) */
        #leaderboard-container {
            flex: 1 1 30%; min-width: 380px; padding: 35px; display: flex; flex-direction: column;
        }
        
        /* 3. 명예의 전당 디테일 & 삭제 버튼 UI */
        #leaderboard-container h2 {
            text-align: center; margin-top: 0; color: #f1c40f; font-size: 32px;
            padding-bottom: 20px; border-bottom: 2px dashed rgba(255,255,255,0.1);
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.4); letter-spacing: 2px;
        }
        
        #leaderboard-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; padding-right: 10px; }
        .leaderboard-item {
            display: flex; justify-content: space-between; align-items: center; padding: 20px;
            border-radius: 20px; margin-bottom: 15px; position: relative;
            background: rgba(30, 35, 45, 0.8);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(255,255,255,0.05); overflow: hidden;
        }
        .leaderboard-item:hover { 
            transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 30px rgba(0,0,0,0.7); 
            border-color: #00d2d3; background: rgba(40, 48, 60, 0.9);
        }
        
        .lb-left { display: flex; align-items: center; gap: 15px; }
        .lb-rank { font-weight: 900; color: #ff9f43; font-size: 20px; min-width: 45px; }
        .lb-user-info { display: flex; flex-direction: column; gap: 3px; }
        .lb-id { font-size: 13px; color: #00d2d3; letter-spacing: 1px; }
        .lb-name { font-size: 18px; color: #ecf0f1; font-weight: bold; }
        
        .lb-right { text-align: right; display: flex; flex-direction: column; gap: 3px; transition: 0.3s; }
        .lb-level { font-size: 18px; color: #f1c40f; font-weight: 900; }
        .lb-budget { font-size: 14px; color: #8395a7; }
        
        /* 삭제 버튼 로직 (호버 시 나타남) */
        .delete-score-btn {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%) scale(0.8);
            background: #ff4757; border: none; width: 40px; height: 40px; border-radius: 50%;
            color: white; font-size: 18px; cursor: pointer; opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.5); display: flex; justify-content: center; align-items: center;
        }
        .leaderboard-item:hover .delete-score-btn { opacity: 1; pointer-events: auto; transform: translateY(-50%) scale(1); }
        .leaderboard-item:hover .lb-right { opacity: 0; transform: translateX(20px); }
        .delete-score-btn:hover { background: #ff6b81; transform: translateY(-50%) scale(1.15) !important; }

        /* 타이틀 네온 이펙트 */
        .game-title {
            font-size: 58px; text-align: center; margin: 0; font-weight: 900;
            background: linear-gradient(to right, #00d2d3, #54a0ff, #5f27cd);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 210, 211, 0.3); letter-spacing: -1px;
        }

        /* 입력 그룹 최적화 (학번 + 이름) */
        .input-group {
            display: flex; gap: 15px; justify-content: center; margin: 45px 0 35px 0; width: 100%;
        }
        .styled-input {
            padding: 20px 25px; font-size: 24px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.1);
            text-align: center; font-family: 'Orbit', sans-serif;
            background: rgba(0,0,0,0.6); color: #fff; box-shadow: inset 0 4px 15px rgba(0,0,0,0.8); 
            transition: all 0.3s;
        }
        .styled-input:focus { border-color: #00d2d3; outline: none; box-shadow: 0 0 25px rgba(0, 210, 211, 0.4), inset 0 4px 12px rgba(0,0,0,0.9); transform: translateY(-3px); }
        #player-id-input { width: 160px; color: #00d2d3; }
        #player-name-input { width: 220px; }

        /* 버튼 그룹 (시작 / 이어하기) */
        .btn-group { display: flex; gap: 20px; justify-content: center; }

        /* 뷰 전환 애니메이션 */
        .view { display: none; flex-direction: column; height: 100%; animation: fadeZoomIn 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .view.active { display: flex; }
        @keyframes fadeZoomIn { from { opacity: 0; transform: scale(0.97) translateY(15px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* 헤더 / 푸터 */
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .footer { display: flex; justify-content: space-between; align-items: center; padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); }
        .header-item-group { display: flex; gap: 20px; }
        .header-item, .footer-item { display: flex; flex-direction: column; align-items: center; font-size: 16px; font-weight: bold; color: #a4b0be; gap: 8px; }
        
        .main-content { flex-grow: 1; display: flex; justify-content: space-between; align-items: center; padding: 20px 0; position: relative; }
        
        /* 정보 패널 */
        .info-panel {
            background: rgba(15, 20, 25, 0.85); padding: 25px; border-radius: 20px; width: 250px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 2px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); font-size: 18px; line-height: 1.8; z-index: 10;
        }
        .info-panel p { margin: 12px 0; font-size: 15px; color: #8395a7; }
        .info-panel span, .info-panel div { font-weight: 900; color: #ecf0f1; display: block; }
        #cost { min-height: 55px; color: #ff6b6b; font-size: 24px; margin-top: 5px; text-shadow: 0 0 15px rgba(255, 107, 107, 0.5); }

        /* 메인 게임 강화 버튼 & 원형 버튼 */
        .circular-btn {
            width: 75px; height: 75px; border-radius: 50%;
            background: linear-gradient(145deg, #2b2f36, #1e2227);
            box-shadow: 6px 6px 12px rgba(0,0,0,0.6), -4px -4px 10px rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 32px; display: flex; justify-content: center; align-items: center; user-select: none; color: #ecf0f1;
        }
        .circular-btn:hover { transform: scale(1.15) translateY(-5px); box-shadow: 0 0 25px rgba(0, 210, 211, 0.5); border-color: #00d2d3; }
        .circular-btn:active { transform: scale(0.9); }
        
        .action-panel .enhance-btn {
            width: 220px; height: 220px; font-size: 110px;
            background: linear-gradient(135deg, #2c3e50 0%, #050505 100%);
            box-shadow: 0 25px 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(255,255,255,0.1);
            border: 5px solid #f39c12; z-index: 10;
        }
        .action-panel .enhance-btn:hover { border-color: #e74c3c; box-shadow: 0 0 60px rgba(231, 76, 60, 0.8); transform: scale(1.1) rotate(5deg); }

        /* 학교 이미지 (플로팅 + 글로우) */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 30px rgba(0, 210, 211, 0.2), inset 0 0 20px rgba(0, 210, 211, 0.2); } 50% { box-shadow: 0 0 80px rgba(0, 210, 211, 0.6), inset 0 0 50px rgba(0, 210, 211, 0.4); } }
        
        .school-display-panel { text-align: center; display: flex; flex-direction: column; align-items: center; flex-grow: 1; z-index: 5; position: relative; }
        #image-container {
            width: 380px; height: 380px; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.8) 80%);
            border-radius: 40px; border: 2px solid rgba(0, 210, 211, 0.5);
            margin-bottom: 30px; animation: float 4s ease-in-out infinite, pulseGlow 3s infinite;
        }
        .school-display-panel img { 
            max-width: 90%; max-height: 90%; object-fit: contain; 
            filter: drop-shadow(0 25px 30px rgba(0,0,0,0.8));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        #image-container:hover img { transform: scale(1.2) rotate(3deg); filter: drop-shadow(0 35px 50px rgba(0, 210, 211, 0.5)); }
        
        .school-level-name { font-size: 46px; margin-top: 0; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .school-probability { font-size: 26px; color: #1dd1a1; background: rgba(29, 209, 161, 0.1); padding: 10px 30px; border-radius: 30px; margin-top: 15px; box-shadow: 0 0 20px rgba(29, 209, 161, 0.3); font-weight: bold; border: 2px solid #1dd1a1;}

        /* 결과 화면 모달 */
        #failure-view, #dismantle-success-view, #lobby-view { justify-content: center; align-items: center; text-align: center; }
        .result-message { font-size: 72px; font-weight: 900; color: #ff4757; margin: 20px 0; text-shadow: 0 0 30px rgba(255, 71, 87, 0.6); }
        
        .action-btn {
            width: 320px; height: 75px; border-radius: 22px; font-size: 30px; font-weight: 900;
            background: linear-gradient(135deg, #2f3542, #1e272e); border: 1px solid #57606f; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); cursor: pointer; transition: 0.3s;
            font-family: 'Orbit', sans-serif; color: #fff; margin-top: 15px;
        }
        .action-btn:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 0 35px rgba(0, 210, 211, 0.5); border-color: #00d2d3; }
        
        .primary-btn {
            background: linear-gradient(135deg, #10ac84, #1dd1a1); border: none; box-shadow: 0 15px 35px rgba(16, 172, 132, 0.4); color: #111;
        }
        .primary-btn:hover { box-shadow: 0 0 40px rgba(29, 209, 161, 0.8); border-color: transparent; color: #fff; }

        .load-btn { background: linear-gradient(135deg, #f39c12, #e67e22); color: #fff; border: none; }
        .load-btn:hover { box-shadow: 0 0 40px rgba(243, 156, 18, 0.8); }

        /* 그리드 및 스크롤바 */
        .shop-grid, .inventory-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 20px 10px; overflow-y: auto; }
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; border: 3px solid transparent; background-clip: padding-box;}
        ::-webkit-scrollbar-thumb:hover { background-color: rgba(0, 210, 211, 0.8); }
        
        /* 알림 배지 (Auto Save) */
        .auto-save-badge {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71;
            padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold;
            opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 100;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="game-container" class="glass-panel">
        <div class="auto-save-badge" id="save-badge">저장 완료 ✔️</div>

        <div id="lobby-view" class="view active">
            <h1 class="game-title" style="font-size: 85px; margin-bottom: 10px; text-shadow: 0 0 40px rgba(0, 210, 211, 0.4);">학교 강화하기</h1>
            <p style="color: #a4b0be; font-size: 22px; margin-top: 0; background: rgba(0,0,0,0.4); padding: 8px 30px; border-radius: 20px;">어둠을 뚫고 최고의 학교를 건설하라!</p>
            
            <div class="input-group">
                <input type="number" id="player-id-input" class="styled-input" placeholder="학번 (예: 10101)">
                <input type="text" id="player-name-input" class="styled-input" placeholder="이름을 입력하세요">
            </div>

            <div class="btn-group">
                <button id="start-game-btn" class="action-btn primary-btn" style="width: 250px;">새 게임 시작 🚀</button>
                <button id="load-game-btn" class="action-btn load-btn" style="width: 250px; display: none;">이어하기 💾</button>
            </div>
        </div>

        <div id="main-game-view" class="view">
            <header class="header">
                <div class="header-item-group">
                    <div class="header-item"><button id="go-to-inventory-btn" class="circular-btn">🎒</button><span>인벤토리</span></div>
                    <div class="header-item"><button id="end-game-btn" class="circular-btn" style="color:#ff4757;">🏁</button><span>게임 포기</span></div>
                </div>
                <h1 class="game-title" style="font-size: 48px; flex-grow: 1;">학교 강화하기</h1>
                <div class="header-item"><button id="top-right-action-btn" class="circular-btn">🏪</button><span id="top-right-action-label">블랙 마켓</span></div>
            </header>
            <main class="main-content">
                <div class="info-panel">
                    <p>최고 기록<br><span style="font-size: 32px; color: #f1c40f;" id="max-level-display">0</span>강</p>
                    <p>강화비용<br><div id="cost">0원</div></p>
                    <p>매각가격<br><span id="school-value" style="font-size: 26px; color: #1dd1a1;">0</span>원</p>
                </div>
                <div class="school-display-panel">
                    <div id="image-container">
                        <img id="school-image" src="" alt="학교 이미지" onerror="this.src='https://via.placeholder.com/350/0f141e/ffffff?text=Image+Not+Found';">
                    </div>
                    <div id="school-level-name" class="school-level-name">+0 빈 공터</div>
                    <div id="school-probability" class="school-probability">성공률 100%</div>
                </div>
                <div class="action-panel"><div id="enhance-btn" class="circular-btn enhance-btn">🔨</div></div>
            </main>
            <footer class="footer">
                <div class="footer-item" style="flex-direction: row; align-items: center; gap: 20px;">
                    <div style="background: rgba(0,0,0,0.5); padding: 15px 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
                        🛡️ 방지권 : <span id="prevent-count" style="font-size: 28px; color:#ff9ff3; font-weight:900;">0</span>개
                    </div>
                </div>
                <div class="footer-item" style="text-align: right; background: rgba(0,0,0,0.5); padding: 15px 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">
                    <p style="margin: 0; font-size: 16px; color: #a4b0be;">학교보유예산</p>
                    <p style="margin: 0;"><span id="budget" style="color:#1dd1a1; font-weight:900; font-size:32px;">0</span> <span style="font-size: 20px;">원</span></p>
                </div>
            </footer>
        </div>
        
        <div id="shop-view" class="view">
            <header class="header"><h1 class="game-title">블랙 마켓</h1><div class="header-item"><button class="back-to-main-btn circular-btn">↩️</button></div></header>
            <div class="shop-grid" style="color:white; font-size: 20px; text-align: center; margin-top: 50px;">준비 중인 기능입니다... (기존 상점 HTML 연동)</div>
        </div>
        <div id="inventory-view" class="view">
            <header class="header"><h1 class="game-title">나의 유물함</h1><div class="header-item"><button class="back-to-main-btn circular-btn">↩️</button></div></header>
            <div class="inventory-grid" style="color:white; font-size: 20px; text-align: center; margin-top: 50px;">아이템이 없습니다.</div>
        </div>
        <div id="failure-view" class="view">
            <h2 class="result-message">학교가 붕괴되었습니다 💥</h2>
            <button id="retry-btn" class="action-btn">처음부터 다시</button>
        </div>
    </div>
    
    <div id="leaderboard-container" class="glass-panel">
        <h2>🏆 명예의 전당 🏆</h2>
        <ul id="leaderboard-list"></ul>
    </div>
</div>

<script>
// ===================================
// 게임 핵심 로직 및 데이터
// ===================================
let currentLevel, schoolBudget, gameStarted, maxLevelAchieved;
let inventory;
let currentPlayerId = "";
let currentPlayerName = "";

const levelNames = ["빈 공터", "텐트 교실", "나무 판자 학교", "고철을 덧붙인 학교", "쓰러져가는 콘크리트 교실", "컨테이너 교실", "작은 벽돌 학교", "초등학교 건물", "모듈러 교실", "(구) 청주신흥고등학교", "그린 스마트 스쿨 청주신흥고등학교", "스마트 AI 학교", "에코(Eco) 학교", "친환경 에너지 발전 학교", "증강현실 융합 학교", "메타버스 학교(15)", "무한 에너지 학교", "우주 정거장 학교", "초지능 학교", "은하계 교육 허브", "초미래형 교육형 럭셔리 신흥고등학교(20)"];
const enhancementCosts = [30000, 30000, 50000, 50000, 100000, 150000, 200000, 200000, 300000, 500000, 1000000, 2000000, 3500000, 5500000, 10000000, 18000000, 0, 0, 0, 0];
const schoolValues = [0, 15000, 40000, 60000, 80000, 160000, 350000, 610000, 1000000, 2000000, 3510000, 16000000, 35000000, 100000000, 300000000, 750000000, 1500000000, 3000000000, 7000000000, 15000000000, 99999999999];
const successRates = [1.00, 1.00, 0.95, 0.95, 0.90, 0.90, 0.85, 0.85, 0.80, 0.80, 0.85, 0.80, 0.80, 0.50, 0.50, 0.50, 0.50, 0.50, 0.50, 0.08];

const views = document.querySelectorAll('.view');
const startGameBtn = document.getElementById('start-game-btn');
const loadGameBtn = document.getElementById('load-game-btn');
const enhanceBtn = document.getElementById('enhance-btn');
const endGameBtn = document.getElementById('end-game-btn');
const leaderboardList = document.getElementById('leaderboard-list');
const saveBadge = document.getElementById('save-badge');

function showView(viewId) { views.forEach(v => v.classList.toggle('active', v.id === viewId)); }

function checkSaveData() {
    if (localStorage.getItem('schoolGameSave')) {
        loadGameBtn.style.display = 'block';
    }
}

function showSaveBadge() {
    saveBadge.style.opacity = '1';
    setTimeout(() => { saveBadge.style.opacity = '0'; }, 1500);
}

function autoSave() {
    const saveData = { currentLevel, schoolBudget, inventory, gameStarted, maxLevelAchieved, currentPlayerId, currentPlayerName };
    localStorage.setItem('schoolGameSave', JSON.stringify(saveData));
    showSaveBadge();
}

function clearSaveData() {
    localStorage.removeItem('schoolGameSave');
}

function updateDisplay() {
    if (currentLevel > maxLevelAchieved) { maxLevelAchieved = currentLevel; }
    document.getElementById('max-level-display').textContent = maxLevelAchieved;
    document.getElementById('budget').textContent = schoolBudget.toLocaleString();
    document.getElementById('school-level-name').textContent = `+${currentLevel} ${levelNames[currentLevel]}`;
    document.getElementById('school-value').textContent = schoolValues[currentLevel].toLocaleString();
    
    // 이미지 처리 (png 확장자 보장)
    const imgEl = document.getElementById('school-image');
    imgEl.src = `school_${currentLevel}.png`;

    if (currentLevel >= 20) {
        document.getElementById('cost').innerHTML = "<span style='color:#f1c40f'>최종 진화 완료!</span>";
        document.getElementById('school-probability').textContent = "더 이상 강화할 수 없습니다.";
        enhanceBtn.style.display = 'none';
        autoSave();
        return;
    }
    
    enhanceBtn.style.display = 'flex';
    document.getElementById('cost').innerHTML = enhancementCosts[currentLevel].toLocaleString() + '원';
    document.getElementById('school-probability').textContent = `성공률 ${(successRates[currentLevel] * 100).toFixed(0)}%`;
    
    if(gameStarted) autoSave(); // 변화가 있을 때마다 자동 저장
}

// 명예의 전당 관련 로직
function loadLeaderboard() { return JSON.parse(localStorage.getItem('schoolLeaderboardV2')) || []; }

function saveToLeaderboard(score) {
    const scores = loadLeaderboard();
    scores.push(score);
    scores.sort((a, b) => {
        if (b.level !== a.level) return b.level - a.level;
        return b.budget - a.budget;
    });
    localStorage.setItem('schoolLeaderboardV2', JSON.stringify(scores));
}

// 💥 명예의 전당 렌더링 및 삭제 기능 추가
function renderLeaderboard() {
    const scores = loadLeaderboard();
    leaderboardList.innerHTML = '';
    scores.slice(0, 15).forEach((score, index) => {
        const li = document.createElement('li');
        li.className = 'leaderboard-item';
        
        // 학번 포맷 (없으면 공백 처리)
        const idText = score.id ? `<span class="lb-id">${score.id}</span>` : '';
        
        li.innerHTML = `
            <div class="lb-left">
                <span class="lb-rank">${index + 1}위</span>
                <div class="lb-user-info">
                    ${idText}
                    <span class="lb-name">${score.name}</span>
                </div>
            </div>
            <div class="lb-right">
                <span class="lb-level">${score.level}강</span>
                <span class="lb-budget">${score.budget.toLocaleString()}원</span>
            </div>
            <button class="delete-score-btn" onclick="deleteScore(${index})" title="기록 삭제">🗑️</button>
        `;
        leaderboardList.appendChild(li);
    });
}

window.deleteScore = function(index) {
    if(confirm("이 기록을 명예의 전당에서 정말 삭제하시겠습니까?")) {
        let scores = loadLeaderboard();
        scores.splice(index, 1);
        localStorage.setItem('schoolLeaderboardV2', JSON.stringify(scores));
        renderLeaderboard();
    }
}

function endGame() {
    if (currentLevel > 0 || schoolBudget > 50000000) {
        const score = { id: currentPlayerId, name: currentPlayerName, level: maxLevelAchieved, budget: schoolBudget };
        saveToLeaderboard(score);
    }
    clearSaveData();
    renderLeaderboard();
    showView('lobby-view');
    loadGameBtn.style.display = 'none'; // 초기화
    document.getElementById('player-id-input').value = '';
    document.getElementById('player-name-input').value = '';
}

// 이벤트 리스너
startGameBtn.addEventListener('click', () => {
    const idVal = document.getElementById('player-id-input').value.trim();
    const nameVal = document.getElementById('player-name-input').value.trim();
    
    if (!nameVal) { alert('이름을 반드시 입력해주세요!'); return; }
    
    currentPlayerId = idVal;
    currentPlayerName = nameVal;
    
    currentLevel = 0; maxLevelAchieved = 0; schoolBudget = 50000000;
    inventory = { preventDestruction: 0, relics: {} };
    gameStarted = true;
    
    updateDisplay();
    showView('main-game-view');
});

loadGameBtn.addEventListener('click', () => {
    const saved = JSON.parse(localStorage.getItem('schoolGameSave'));
    if(saved) {
        currentLevel = saved.currentLevel;
        schoolBudget = saved.schoolBudget;
        inventory = saved.inventory;
        gameStarted = saved.gameStarted;
        maxLevelAchieved = saved.maxLevelAchieved;
        currentPlayerId = saved.currentPlayerId || "";
        currentPlayerName = saved.currentPlayerName || "Unknown";
        
        updateDisplay();
        showView('main-game-view');
    }
});

enhanceBtn.addEventListener('click', function() {
    if (currentLevel >= 20) return;
    if (schoolBudget < enhancementCosts[currentLevel]) {
        alert("예산이 부족합니다!"); return;
    }

    schoolBudget -= enhancementCosts[currentLevel];
    
    if (Math.random() < successRates[currentLevel]) {
        currentLevel++;
    } else { 
        clearSaveData();
        showView('failure-view');
        return; 
    }
    updateDisplay();
});

document.getElementById('retry-btn').addEventListener('click', () => {
    currentLevel = 0;
    schoolBudget = 50000000;
    updateDisplay();
    showView('main-game-view');
});

endGameBtn.addEventListener('click', () => {
    if(confirm("정말 게임을 포기하고 기록을 저장하시겠습니까?")) {
        endGame();
    }
});

document.querySelectorAll('.back-to-main-btn').forEach(btn => {
    btn.addEventListener('click', () => showView('main-game-view'));
});

// 초기 실행
checkSaveData();
renderLeaderboard();
showView('lobby-view');

</script>
</body>
</html>
